services:
  db:
    image: postgres:16-alpine
    container_name: drras_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: drras_user
      POSTGRES_PASSWORD: drras_pass
      POSTGRES_DB: drras_db
    ports:
      - "5432:5432"
    volumes:
      - drras_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drras_user -d drras_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: drras_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://drras_user:drras_pass@db:5432/drras_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  drras_pgdata:
